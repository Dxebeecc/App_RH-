<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guardião do RH</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Fonte Inter do Google -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            50: '#eef2ff',
                            100: '#e0e7ff',
                            500: '#6366f1',
                            600: '#4f46e5',
                            700: '#4338ca',
                            900: '#312e81',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; }

        /* Animação do card de resultado */
        .resultado-card {
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            transform: translateY(20px);
            opacity: 0;
            display: none;
        }
        .resultado-card.show {
            transform: translateY(0);
            opacity: 1;
            display: block;
        }
        
        /* Transição para a sanfona (accordion) */
        .accordion-content {
            transition: max-height 0.4s ease-in-out, opacity 0.3s ease-in-out;
            max-height: 0;
            opacity: 0;
            overflow: hidden;
        }
        .accordion-content.open {
            max-height: 800px; 
            opacity: 1;
        }

        /* Estilo do marcador da barra de progresso - animação de "salto" */
        .marcador-progresso {
            transition: left 1.2s cubic-bezier(0.34, 1.56, 0.64, 1); 
        }

        /* Custom Scrollbar para áreas internas */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="bg-[#f8fafc] text-slate-800 antialiased min-h-screen flex items-center justify-center p-4 sm:p-6">

    <div class="max-w-3xl w-full bg-white rounded-[24px] shadow-[0_20px_50px_rgba(15,23,42,0.06)] overflow-hidden border border-slate-100">
        
        <!-- CABEÇALHO PRINCIPAL -->
        <div class="bg-brand-900 border-b border-brand-700/50 p-6 md:p-8 flex flex-col sm:flex-row items-center sm:justify-between relative overflow-hidden">
            <!-- Padrão de fundo suave -->
            <div class="absolute inset-0 opacity-10 bg-[radial-gradient(circle_at_top_right,_var(--tw-gradient-stops))] from-white via-transparent to-transparent"></div>
            
            <div class="flex items-center space-x-4 z-10">
                <!-- Logo: Escudo Abstrato -->
                <div class="w-12 h-12 bg-white/10 rounded-xl flex items-center justify-center backdrop-blur-sm border border-white/20 shadow-inner">
                    <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path>
                    </svg>
                </div>
                <div>
                    <h1 class="text-xl md:text-2xl font-bold tracking-tight text-white leading-tight">Guardião do RH</h1>
                    <p class="text-brand-100/70 text-[11px] md:text-xs font-semibold uppercase tracking-widest mt-0.5">Plataforma de Saúde Organizacional</p>
                </div>
            </div>
            
            <!-- Badge de Status Opcional -->
            <div class="hidden sm:flex items-center px-3 py-1 bg-white/10 rounded-full border border-white/10 z-10">
                <span class="w-2 h-2 rounded-full bg-emerald-400 mr-2 animate-pulse"></span>
                <span class="text-xs text-white font-medium">Sistema Ativo</span>
            </div>
        </div>

        <!-- CORPO DO APP (Formulário) -->
        <div class="p-6 md:p-8 lg:p-10">
            <form id="cockpitForm" class="space-y-8">
                
                <!-- Seção 1: Configuração da Análise -->
                <div>
                    <h2 class="text-sm font-bold text-slate-800 uppercase tracking-wider mb-4 border-b border-slate-100 pb-2 flex items-center">
                        <svg class="w-4 h-4 mr-2 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                        Identificação
                    </h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                        <div>
                            <label for="nome" class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">Profissional Avaliado</label>
                            <input type="text" id="nome" placeholder="Digite o nome do analista" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-brand-500 focus:border-brand-500 outline-none transition-all text-sm bg-slate-50 hover:bg-white" required>
                        </div>
                        <div>
                            <label for="periodo" class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">Período de Análise</label>
                            <div class="relative">
                                <select id="periodo" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-brand-500 focus:border-brand-500 outline-none transition-all bg-slate-50 hover:bg-white cursor-pointer text-sm appearance-none">
                                    <option value="Semanal" selected>Semanal (Recomendado)</option>
                                    <option value="Quinzenal">Quinzenal</option>
                                    <option value="Mensal">Mensal</option>
                                </select>
                                <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-slate-400">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Seção 2: Inputs de Carga -->
                <div>
                    <h2 class="text-sm font-bold text-slate-800 uppercase tracking-wider mb-4 border-b border-slate-100 pb-2 flex items-center">
                        <svg class="w-4 h-4 mr-2 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path></svg>
                        Métricas de Absorção
                    </h2>
                    
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <!-- Card: Carga Emocional -->
                        <div class="bg-white p-5 rounded-2xl border border-slate-200 shadow-[0_4px_12px_rgba(0,0,0,0.02)] group hover:border-rose-200 transition-colors">
                            <h3 class="text-[13px] font-bold text-slate-800 uppercase mb-5 flex items-center tracking-wider">
                                <span class="w-8 h-8 rounded-lg bg-rose-50 text-rose-500 flex items-center justify-center mr-3 border border-rose-100 group-hover:bg-rose-500 group-hover:text-white transition-colors">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"></path></svg>
                                </span> 
                                Carga Emocional
                            </h3>
                            <div class="space-y-4">
                                <div>
                                    <label for="conflitos" class="block text-sm text-slate-700 flex justify-between font-medium">
                                        <span>Mediação de Conflitos</span> <span class="text-xs px-2 py-0.5 rounded bg-rose-50 text-rose-600 font-bold">Peso 10</span>
                                    </label>
                                    <input type="number" id="conflitos" min="0" value="0" class="mt-2 w-full px-4 py-2.5 rounded-lg border border-slate-200 focus:ring-2 focus:ring-rose-400 outline-none text-sm bg-slate-50 transition-all font-mono text-center">
                                </div>
                                <div>
                                    <label for="demissoes" class="block text-sm text-slate-700 flex justify-between font-medium">
                                        <span>Demissões Conduzidas</span> <span class="text-xs px-2 py-0.5 rounded bg-rose-50 text-rose-600 font-bold">Peso 8</span>
                                    </label>
                                    <input type="number" id="demissoes" min="0" value="0" class="mt-2 w-full px-4 py-2.5 rounded-lg border border-slate-200 focus:ring-2 focus:ring-rose-400 outline-none text-sm bg-slate-50 transition-all font-mono text-center">
                                </div>
                                <div>
                                    <label for="interrupcoes" class="block text-sm text-slate-700 flex justify-between font-medium">
                                        <span>Interrupções/Porta</span> <span class="text-xs px-2 py-0.5 rounded bg-slate-100 text-slate-500 font-bold">Peso 1</span>
                                    </label>
                                    <input type="number" id="interrupcoes" min="0" value="0" class="mt-2 w-full px-4 py-2.5 rounded-lg border border-slate-200 focus:ring-2 focus:ring-rose-400 outline-none text-sm bg-slate-50 transition-all font-mono text-center">
                                </div>
                            </div>
                        </div>

                        <!-- Card: Carga Cognitiva -->
                        <div class="bg-white p-5 rounded-2xl border border-slate-200 shadow-[0_4px_12px_rgba(0,0,0,0.02)] group hover:border-brand-200 transition-colors">
                            <h3 class="text-[13px] font-bold text-slate-800 uppercase mb-5 flex items-center tracking-wider">
                                <span class="w-8 h-8 rounded-lg bg-brand-50 text-brand-500 flex items-center justify-center mr-3 border border-brand-100 group-hover:bg-brand-500 group-hover:text-white transition-colors">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"></path></svg>
                                </span>
                                Carga Cognitiva
                            </h3>
                            <div class="space-y-4">
                                <div>
                                    <label for="vagas" class="block text-sm text-slate-700 flex justify-between font-medium">
                                        <span>Vagas/Seleções Abertas</span> <span class="text-xs px-2 py-0.5 rounded bg-brand-50 text-brand-600 font-bold">Peso 4</span>
                                    </label>
                                    <input type="number" id="vagas" min="0" value="0" class="mt-2 w-full px-4 py-2.5 rounded-lg border border-slate-200 focus:ring-2 focus:ring-brand-400 outline-none text-sm bg-slate-50 transition-all font-mono text-center">
                                </div>
                                <div>
                                    <label for="horasExtras" class="block text-sm text-slate-700 flex justify-between font-medium">
                                        <span>Horas Extras Realizadas</span> <span class="text-xs px-2 py-0.5 rounded bg-brand-50 text-brand-600 font-bold">Peso 3</span>
                                    </label>
                                    <input type="number" id="horasExtras" min="0" value="0" class="mt-2 w-full px-4 py-2.5 rounded-lg border border-slate-200 focus:ring-2 focus:ring-brand-400 outline-none text-sm bg-slate-50 transition-all font-mono text-center">
                                </div>
                                <div>
                                    <label for="fechamento" class="block text-sm text-slate-700 flex justify-between font-medium">
                                        <span>Pessoas Processadas (Folha)</span> <span class="text-xs px-2 py-0.5 rounded bg-slate-100 text-slate-500 font-bold">Peso 0.2</span>
                                    </label>
                                    <input type="number" id="fechamento" min="0" value="0" class="mt-2 w-full px-4 py-2.5 rounded-lg border border-slate-200 focus:ring-2 focus:ring-brand-400 outline-none text-sm bg-slate-50 transition-all font-mono text-center">
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Botões de Ação -->
                <div class="flex flex-col sm:flex-row gap-4 pt-4 border-t border-slate-100 mt-8">
                    <button type="button" onclick="calcularCarga()" class="w-full sm:w-2/3 bg-brand-600 hover:bg-brand-700 text-white font-semibold py-4 px-6 rounded-xl transition duration-300 ease-in-out text-sm shadow-[0_4px_14px_0_rgba(99,102,241,0.39)] hover:shadow-[0_6px_20px_rgba(99,102,241,0.23)] hover:-translate-y-0.5 flex justify-center items-center">
                        Gerar Diagnóstico Avançado
                        <svg class="w-4 h-4 ml-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                    </button>
                    <button type="reset" onclick="esconderResultado()" class="w-full sm:w-1/3 bg-white border-2 border-slate-200 hover:border-slate-300 hover:bg-slate-50 text-slate-600 font-medium py-4 px-6 rounded-xl transition duration-200 ease-in-out text-sm">
                        Nova Análise
                    </button>
                </div>
            </form>

            <!-- ================= ÁREA DE RESULTADO REFORMULADA ================= -->
            <div id="resultadoBox" class="resultado-card mt-12 bg-white rounded-3xl shadow-[0_10px_40px_rgba(0,0,0,0.08)] border border-slate-100 overflow-hidden">
                
                <!-- Cabeçalho Dinâmico do Laudo -->
                <div id="headerLaudo" class="p-6 md:p-8 flex flex-col md:flex-row items-center md:items-start justify-between gap-6 transition-colors duration-500">
                    
                    <!-- Lado Esquerdo: Textos e Nota -->
                    <div class="w-full md:w-1/2 text-center md:text-left">
                        <span class="text-[11px] font-bold uppercase tracking-widest opacity-60 mb-1.5 block">Status da Avaliação</span>
                        <h2 id="resultadoTitulo" class="text-2xl md:text-3xl font-black uppercase tracking-tight mb-1"></h2>
                        <div class="flex items-baseline justify-center md:justify-start gap-1.5">
                            <span id="resultadoPontos" class="text-5xl font-black tracking-tighter"></span>
                            <span class="text-sm font-semibold opacity-70">pts</span>
                        </div>
                    </div>

                    <!-- Lado Direito: Régua Progressiva e Marcador Consertado -->
                    <div class="w-full md:w-1/2 max-w-sm mt-2 md:mt-0">
                        <div class="flex justify-between text-[10px] uppercase font-extrabold opacity-60 mb-2 px-1 tracking-wider">
                            <span>Equilíbrio</span>
                            <span>Alerta</span>
                            <span>Crítico</span>
                        </div>
                        
                        <!-- Container Relativo Crucial para o Marcador -->
                        <div class="relative w-full">
                            <!-- Pista de Cores -->
                            <div class="h-3 rounded-full overflow-hidden flex shadow-inner bg-slate-200/50">
                                <div class="h-full bg-emerald-400" style="width: 33.33%"></div>
                                <div class="h-full bg-amber-400" style="width: 29.17%"></div>
                                <div class="h-full bg-rose-500" style="width: 37.5%"></div>
                            </div>
                            
                            <!-- O Marcador agora está preso verticalmente pelo 'top-1/2 -translate-y-1/2' -->
                            <div id="marcadorBarra" class="marcador-progresso absolute top-1/2 -translate-y-1/2 w-5 h-5 rounded-full bg-white border-[3px] border-slate-800 shadow-md" style="left: 0%; margin-left: -10px;"></div>
                        </div>
                    </div>
                </div>

                <!-- Corpo do Laudo -->
                <div class="p-6 md:p-8 pt-0 md:pt-0">
                    
                    <!-- Diagnóstico Clínico (Caixa destacada com cor adaptável) -->
                    <div id="boxDiagnosticoBg" class="p-5 rounded-xl border mt-4 mb-8 transition-colors duration-500">
                        <h4 class="text-xs uppercase font-bold mb-2 tracking-wider flex items-center opacity-80">
                            <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                            Parecer Técnico (<span id="spanPeriodo"></span>)
                        </h4>
                        <p id="textoDiagnostico" class="font-medium text-[15px] leading-relaxed"></p>
                    </div>
                    
                    <!-- Plano de Intervenção (Accordion) -->
                    <div>
                        <h4 class="text-xs uppercase font-extrabold text-slate-800 mb-4 tracking-wider flex items-center border-b border-slate-100 pb-2">
                            Plano de Intervenção Estratégica
                        </h4>
                        <div id="textoAtitude" class="space-y-3">
                            <!-- Injetado via JS -->
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
    </div>

    <script>
        // Função para abrir/fechar a sanfona
        function toggleAccordion(id) {
            const content = document.getElementById('content-' + id);
            const icon = document.getElementById('icon-' + id);
            
            if (content.classList.contains('open')) {
                content.classList.remove('open');
                icon.textContent = '+';
            } else {
                content.classList.add('open');
                icon.innerHTML = '&minus;'; 
            }
        }

        function calcularCarga() {
            // Coleta de Dados
            const nomeInput = document.getElementById('nome').value.trim();
            const nome = nomeInput !== "" ? nomeInput : "O(a) Profissional";
            const periodoSelecionado = document.getElementById('periodo').value;
            
            const conflitos = parseInt(document.getElementById('conflitos').value) || 0;
            const demissoes = parseInt(document.getElementById('demissoes').value) || 0;
            const interrupcoes = parseInt(document.getElementById('interrupcoes').value) || 0;
            const vagas = parseInt(document.getElementById('vagas').value) || 0;
            const horasExtras = parseInt(document.getElementById('horasExtras').value) || 0;
            const fechamento = parseInt(document.getElementById('fechamento').value) || 0;

            // Lógica de Pesos
            const pesoConflito = 10;
            const pesoDemissao = 8;
            const pesoInterrupcao = 1;
            const pesoVaga = 4;
            const pesoHoraExtra = 3;
            const pesoFechamento = 0.2; 

            // Cálculo Matemático
            const cargaTotal = Math.round(
                (conflitos * pesoConflito) + 
                (demissoes * pesoDemissao) + 
                (interrupcoes * pesoInterrupcao) + 
                (vagas * pesoVaga) + 
                (horasExtras * pesoHoraExtra) + 
                (fechamento * pesoFechamento)
            );

            // Inteligência de Período
            let multiplicadorTolerancia = 1;
            let textoFrequencia = "nesta semana";

            if (periodoSelecionado === "Quinzenal") {
                multiplicadorTolerancia = 2;
                textoFrequencia = "nesta quinzena";
            } else if (periodoSelecionado === "Mensal") {
                multiplicadorTolerancia = 4;
                textoFrequencia = "neste mês";
            }

            // Limites
            const limiteVerde = 40 * multiplicadorTolerancia;
            const limiteAmarelo = 75 * multiplicadorTolerancia;
            
            // Lógica da Barra Visual (Base 120 por semana)
            const maxVisualScore = 120 * multiplicadorTolerancia;
            let percentualBarra = (cargaTotal / maxVisualScore) * 100;
            if (percentualBarra > 100) percentualBarra = 100;

            const box = document.getElementById('resultadoBox');
            const headerLaudo = document.getElementById('headerLaudo');
            const titulo = document.getElementById('resultadoTitulo');
            const pontos = document.getElementById('resultadoPontos');
            const boxDiagnosticoBg = document.getElementById('boxDiagnosticoBg');
            const txtDiagnostico = document.getElementById('textoDiagnostico');
            const txtAtitude = document.getElementById('textoAtitude');
            const marcador = document.getElementById('marcadorBarra');
            const spanPeriodo = document.getElementById('spanPeriodo');

            // Limpeza visual profunda usando Tailwind Classes diretas no JS
            const resetClasses = ['bg-emerald-50', 'bg-amber-50', 'bg-rose-50', 'text-emerald-900', 'text-amber-900', 'text-rose-900', 'border-emerald-100', 'border-amber-100', 'border-rose-100'];
            headerLaudo.classList.remove(...resetClasses);
            boxDiagnosticoBg.classList.remove(...resetClasses);
            titulo.classList.remove('text-emerald-900', 'text-amber-900', 'text-rose-900');
            pontos.classList.remove('text-emerald-900', 'text-amber-900', 'text-rose-900');
            box.classList.remove('show');
            
            marcador.style.left = '0%';
            spanPeriodo.textContent = periodoSelecionado;

            setTimeout(() => {
                let conteudoSanfona = '';
                marcador.style.left = percentualBarra + '%';

                if (cargaTotal <= limiteVerde) {
                    // ZONA VERDE
                    headerLaudo.classList.add('bg-emerald-50', 'text-emerald-900');
                    titulo.classList.add('text-emerald-900');
                    pontos.classList.add('text-emerald-900');
                    boxDiagnosticoBg.classList.add('bg-emerald-50', 'border-emerald-100', 'text-emerald-900');
                    
                    titulo.textContent = "Equilíbrio Operacional";
                    pontos.textContent = cargaTotal;
                    txtDiagnostico.innerHTML = `<strong>${nome}</strong> apresenta níveis saudáveis de absorção cognitiva e emocional. A empatia encontra-se preservada, permitindo tomadas de decisão estratégicas e acolhimento genuíno aos colaboradores. O risco psicossocial atual é baixo.`;
                    
                    conteudoSanfona = gerarAccordion(
                        'org', '🛡️ 1. Frente Organizacional',
                        `<li class="leading-relaxed mb-3"><strong>Aproveitamento Estratégico:</strong> Direcionar o foco do profissional para projetos de inovação, como a estruturação do <em>Employer Branding</em> (Marca Empregadora) ou a análise de dados em <em>People Analytics</em>.</li>
                         <li class="leading-relaxed"><strong>Cultura e Mentoria:</strong> Delegar a condução de integrações de novos funcionários (Onboarding) para aproveitar sua estabilidade emocional e engajamento, transmitindo uma energia positiva aos recém-chegados.</li>`
                    ) + gerarAccordion(
                        'psi', '🧠 2. Frente Psicológica',
                        `<li class="leading-relaxed"><strong>1:1 de Carreira:</strong> Manter a rotina de reuniões de alinhamento com a liderança, priorizando discussões sobre desenvolvimento e plano de carreira, demonstrando claramente o investimento da empresa no futuro do colaborador.</li>`
                    ) + gerarAccordion(
                        'bem', '💆 3. Frente de Bem-Estar e Benefícios',
                        `<li class="leading-relaxed mb-3"><strong>Incentivo à Qualidade de Vida:</strong> Reforçar a comunicação para que o profissional utilize as plataformas parceiras da empresa (como Gympass/Wellhub, ou convênios com nutricionistas e psicólogos preventivos).</li>
                         <li class="leading-relaxed"><strong>Recompensa Operacional:</strong> Avaliar a concessão de <em>Short Friday</em> (saída antecipada na sexta-feira) como um reforço positivo (Behaviorismo) pelo desempenho sustentável entregue.</li>`
                    );

                } else if (cargaTotal > limiteVerde && cargaTotal <= limiteAmarelo) {
                    // ZONA AMARELA
                    headerLaudo.classList.add('bg-amber-50', 'text-amber-900');
                    titulo.classList.add('text-amber-900');
                    pontos.classList.add('text-amber-900');
                    boxDiagnosticoBg.classList.add('bg-amber-50', 'border-amber-100', 'text-amber-900');
                    
                    titulo.textContent = "Alerta: Fadiga por Compaixão";
                    pontos.textContent = cargaTotal;
                    txtDiagnostico.innerHTML = `O nível de estresse de <strong>${nome}</strong> atingiu uma margem de atenção. Há alto risco do profissional iniciar o atendimento em "modo automático", reduzindo a humanização e a escuta ativa como defesa emocional contra a sobrecarga.`;
                    
                    conteudoSanfona = gerarAccordion(
                        'org', '🛡️ 1. Frente Organizacional',
                        `<li class="leading-relaxed mb-3"><strong>Deep Work (Bloco de Foco):</strong> Instituir pelo menos 2 períodos na semana de "Porta Fechada" (sem atendimento ao público ou interrupções operacionais) permitindo o escoamento das pendências.</li>
                         <li class="leading-relaxed"><strong>Rodízio de Front:</strong> O gestor deve bloquear a agenda do profissional para a condução de novas demissões ou mediações de conflito nos próximos dias, diluindo a carga com a equipe.</li>`
                    ) + gerarAccordion(
                        'psi', '🧠 2. Frente Psicológica',
                        `<li class="leading-relaxed mb-3"><strong>Supervisão Emocional:</strong> A liderança deve realizar uma escuta ativa de 30 minutos focada exclusivamente em acolhimento emocional. É expressamente proibido falar de metas neste momento.</li>
                         <li class="leading-relaxed"><strong>Grupos de Balint (Adaptação RH):</strong> Incentivar a participação em rodas de conversa seguras da própria equipe para processamento coletivo da carga de casos difíceis, aliviando a "solidão da decisão".</li>`
                    ) + gerarAccordion(
                        'bem', '💆 3. Frente de Bem-Estar e Benefícios',
                        `<li class="leading-relaxed mb-3"><strong>Descompressão In Loco:</strong> Liberação documentada para uso da Sala Zen/Descanso da empresa durante o expediente e agendamento prioritário de sessão de <em>Quick Massage</em> corporativa.</li>
                         <li class="leading-relaxed"><strong>Pausas Ativas Obrigatórias:</strong> A cada 2 horas de trabalho analítico pesado (como folha), o profissional deve realizar uma micro-pausa de 10 minutos desconectada de telas para alongamento.</li>`
                    );

                } else {
                    // ZONA VERMELHA
                    headerLaudo.classList.add('bg-rose-50', 'text-rose-900');
                    titulo.classList.add('text-rose-900');
                    pontos.classList.add('text-rose-900');
                    boxDiagnosticoBg.classList.add('bg-rose-50', 'border-rose-100', 'text-rose-900');
                    
                    titulo.textContent = "Risco Crítico de Burnout";
                    pontos.textContent = cargaTotal;
                    txtDiagnostico.innerHTML = `<strong>ALERTA CLÍNICO:</strong> Sobrecarga extrema detectada em <strong>${nome}</strong>. Há esgotamento de recursos para mediação humana. O risco de afastamento médico, erros graves na folha ou geração de passivo trabalhista por condução inadequada é iminente.`;
                    
                    conteudoSanfona = gerarAccordion(
                        'org', '🛡️ 1. Frente Organizacional',
                        `<li class="leading-relaxed mb-3"><strong>Afastamento Total do Front:</strong> Movimentação emergencial imediata. O profissional é retirado no mesmo dia de qualquer contato com o público, mediações ou demissões. Realocação para o <em>Backoffice</em>.</li>
                         <li class="leading-relaxed"><strong>Auditoria Estrutural:</strong> Notificar a Diretoria Executiva sobre o estouro do <em>RH Headcount Ratio</em>. O setor demonstra necessidade de contratação com urgência para diluição da carga operacional.</li>`
                    ) + gerarAccordion(
                        'psi', '🧠 2. Frente Psicológica',
                        `<li class="leading-relaxed mb-3"><strong>EAP Obrigatório (Apoio Psicológico):</strong> A liderança aciona o Programa de Apoio ao Empregado, garantindo o encaminhamento formal do profissional para sessões de psicoterapia custeadas pela empresa.</li>
                         <li class="leading-relaxed"><strong>Debriefing de Trauma:</strong> Sessão de descompressão especializada guiada para ajudar o analista a processar e não internalizar "o trauma do outro", essencial após o atendimento de casos de assédio moral/sexual.</li>`
                    ) + gerarAccordion(
                        'bem', '💆 3. Frente de Bem-Estar e Benefícios',
                        `<li class="leading-relaxed mb-3"><strong>Quebra de Ciclo (Day Off):</strong> Ação imediata para cortar a produção de cortisol. O profissional recebe uma folga compulsória não descontada para focar na recuperação de sua Higiene do Sono.</li>
                         <li class="leading-relaxed"><strong>Desconexão Digital Protegida:</strong> Durante o afastamento, a TI atua bloqueando ativamente os gestores e encarregados de entrarem em contato com este funcionário, garantindo repouso real.</li>`
                    );
                }
                
                txtAtitude.innerHTML = conteudoSanfona;
                box.classList.add('show');
                
                // Rola a página suavemente para o resultado
                setTimeout(() => {
                    box.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }, 100);

            }, 50);
        }

        // Função para gerar o HTML do Accordion (Sanfona) atualizado
        function gerarAccordion(id, titulo, itensLista) {
            return `
            <div class="border border-slate-200 rounded-xl overflow-hidden bg-white hover:border-slate-300 hover:shadow-sm transition-all duration-200">
                <button type="button" onclick="toggleAccordion('${id}')" class="w-full px-5 py-4 flex justify-between items-center text-left focus:outline-none group bg-slate-50/50">
                    <span class="font-bold text-sm text-slate-700 group-hover:text-brand-600 transition-colors">${titulo}</span>
                    <span id="icon-${id}" class="text-xl font-medium text-slate-400 group-hover:text-brand-500 transition-colors">+</span>
                </button>
                <div id="content-${id}" class="accordion-content">
                    <div class="px-5 pb-5 pt-3 border-t border-slate-100">
                        <ul class="list-disc pl-4 text-[13.5px] text-slate-600">
                            ${itensLista}
                        </ul>
                    </div>
                </div>
            </div>`;
        }

        function esconderResultado() {
            const box = document.getElementById('resultadoBox');
            box.classList.remove('show');
            setTimeout(() => {
                const resetClasses = ['bg-emerald-50', 'bg-amber-50', 'bg-rose-50', 'text-emerald-900', 'text-amber-900', 'text-rose-900', 'border-emerald-100', 'border-amber-100', 'border-rose-100'];
                document.getElementById('headerLaudo').classList.remove(...resetClasses);
                document.getElementById('boxDiagnosticoBg').classList.remove(...resetClasses);
                document.getElementById('marcadorBarra').style.left = '0%';
            }, 500); 
        }
    </script>
</body>
</html>
