<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cockpit: Guardião do RH</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Animação suave para o card de resultado */
        .resultado-card {
            transition: all 0.4s ease-in-out;
            transform: translateY(10px);
            opacity: 0;
            display: none;
        }
        .resultado-card.show {
            transform: translateY(0);
            opacity: 1;
            display: block;
        }
        
        /* Cores temáticas para os diferentes níveis de risco (borda lateral mais grossa) */
        .border-verde-alerta { border-color: #22c55e; }
        .text-verde-alerta { color: #166534; }
        
        .border-amarelo-alerta { border-color: #f59e0b; }
        .text-amarelo-alerta { color: #92400e; }
        
        .border-vermelho-alerta { border-color: #ef4444; }
        .text-vermelho-alerta { color: #991b1b; }
        
        /* Transição para a sanfona (accordion) */
        .accordion-content {
            transition: max-height 0.3s ease-in-out, opacity 0.3s ease-in-out;
            max-height: 0;
            opacity: 0;
            overflow: hidden;
        }
        .accordion-content.open {
            max-height: 500px; /* valor alto o suficiente para caber o texto */
            opacity: 1;
        }
    </style>
</head>
<body class="bg-slate-50 font-sans text-slate-800 antialiased min-h-screen flex items-center justify-center p-4">

    <div class="max-w-2xl w-full bg-white rounded-xl shadow-lg overflow-hidden border border-slate-100">
        
        <!-- Cabeçalho (Sleek & Clean) -->
        <div class="bg-slate-800 p-6 text-white text-center">
            <h1 class="text-2xl font-bold tracking-tight">Cockpit: Guardião do RH</h1>
            <p class="text-slate-400 mt-1 text-xs font-medium uppercase tracking-wider">Monitoramento de Carga Cognitiva e Emocional</p>
        </div>

        <div class="p-6 md:p-8">
            <form id="cockpitForm" class="space-y-5">
                
                <!-- Identificação e Período -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label for="nome" class="block text-xs font-semibold text-slate-500 uppercase tracking-wide mb-1">Profissional Avaliado</label>
                        <input type="text" id="nome" placeholder="Ex: João Silva" class="w-full px-3 py-2.5 rounded-lg border border-slate-300 focus:ring-1 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all text-sm" required>
                    </div>
                    <div>
                        <label for="periodo" class="block text-xs font-semibold text-slate-500 uppercase tracking-wide mb-1">Período de Análise</label>
                        <select id="periodo" class="w-full px-3 py-2.5 rounded-lg border border-slate-300 focus:ring-1 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all bg-white cursor-pointer text-sm">
                            <option value="Semanal" selected>Semanal (Recomendado)</option>
                            <option value="Quinzenal">Quinzenal</option>
                            <option value="Mensal">Mensal</option>
                        </select>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                    <!-- Front de Choque (Emocional) -->
                    <div class="bg-white p-4 rounded-xl border border-slate-200">
                        <h3 class="text-xs font-bold text-slate-800 uppercase mb-3 flex items-center tracking-wide">
                            <span class="w-2 h-2 rounded-full bg-red-500 mr-2"></span> Carga Emocional
                        </h3>
                        <div class="space-y-3">
                            <div>
                                <label for="demissoes" class="block text-sm text-slate-700 flex justify-between">
                                    <span>Demissões Conduzidas</span> <span class="text-xs text-slate-400">(Peso 5)</span>
                                </label>
                                <input type="number" id="demissoes" min="0" value="0" class="mt-1 w-full px-3 py-2 rounded-md border border-slate-200 focus:ring-1 focus:ring-red-400 outline-none text-sm bg-slate-50">
                            </div>
                            <div>
                                <label for="conflitos" class="block text-sm text-slate-700 flex justify-between">
                                    <span>Mediações de Conflito/Assédio</span> <span class="text-xs text-slate-400">(Peso 5)</span>
                                </label>
                                <input type="number" id="conflitos" min="0" value="0" class="mt-1 w-full px-3 py-2 rounded-md border border-slate-200 focus:ring-1 focus:ring-red-400 outline-none text-sm bg-slate-50">
                            </div>
                            <div>
                                <label for="interrupcoes" class="block text-sm text-slate-700 flex justify-between">
                                    <span>Atendimentos Surpresa</span> <span class="text-xs text-slate-400">(Peso 2)</span>
                                </label>
                                <input type="number" id="interrupcoes" min="0" value="0" class="mt-1 w-full px-3 py-2 rounded-md border border-slate-200 focus:ring-1 focus:ring-red-400 outline-none text-sm bg-slate-50">
                            </div>
                        </div>
                    </div>

                    <!-- Fadiga Cognitiva (Operacional) -->
                    <div class="bg-white p-4 rounded-xl border border-slate-200">
                         <h3 class="text-xs font-bold text-slate-800 uppercase mb-3 flex items-center tracking-wide">
                            <span class="w-2 h-2 rounded-full bg-blue-500 mr-2"></span> Carga Cognitiva
                        </h3>
                        <div class="space-y-3">
                            <div>
                                <label for="vagas" class="block text-sm text-slate-700 flex justify-between">
                                    <span>Processos Seletivos (Vagas)</span> <span class="text-xs text-slate-400">(Peso 3)</span>
                                </label>
                                <input type="number" id="vagas" min="0" value="0" class="mt-1 w-full px-3 py-2 rounded-md border border-slate-200 focus:ring-1 focus:ring-blue-400 outline-none text-sm bg-slate-50">
                            </div>
                            <div>
                                <label for="horasExtras" class="block text-sm text-slate-700 flex justify-between">
                                    <span>Horas Extras Realizadas</span> <span class="text-xs text-slate-400">(Peso 2)</span>
                                </label>
                                <input type="number" id="horasExtras" min="0" value="0" class="mt-1 w-full px-3 py-2 rounded-md border border-slate-200 focus:ring-1 focus:ring-blue-400 outline-none text-sm bg-slate-50">
                            </div>
                             <div>
                                <label for="fechamento" class="block text-sm text-slate-700 flex justify-between">
                                    <span>Fechamentos (Folha/Ponto)</span> <span class="text-xs text-slate-400">(Peso 3)</span>
                                </label>
                                <input type="number" id="fechamento" min="0" value="0" class="mt-1 w-full px-3 py-2 rounded-md border border-slate-200 focus:ring-1 focus:ring-blue-400 outline-none text-sm bg-slate-50">
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Botões Refinados e Menores -->
                <div class="flex flex-col sm:flex-row gap-3 pt-2">
                    <button type="button" onclick="calcularCarga()" class="w-full sm:w-auto flex-1 bg-slate-800 hover:bg-slate-700 text-white font-medium py-2.5 px-5 rounded-lg transition duration-200 ease-in-out text-sm shadow-sm">
                        Gerar Diagnóstico
                    </button>
                    <button type="reset" onclick="esconderResultado()" class="w-full sm:w-auto bg-white border border-slate-300 hover:bg-slate-50 text-slate-600 font-medium py-2.5 px-5 rounded-lg transition duration-200 ease-in-out text-sm">
                        Nova Análise
                    </button>
                </div>
            </form>

            <!-- Área de Resultado e Diagnóstico -->
            <div id="resultadoBox" class="resultado-card mt-8 border-l-4 bg-white border border-slate-100 rounded-r-lg shadow-md p-6">
                <div class="flex flex-col md:flex-row md:items-center justify-between mb-4 pb-4 border-b border-slate-100 gap-2">
                    <h2 id="resultadoTitulo" class="text-lg md:text-xl font-bold uppercase tracking-wide"></h2>
                    <span id="resultadoPontos" class="text-2xl md:text-3xl font-light text-slate-400"></span>
                </div>
                
                <div class="space-y-6">
                    <!-- Diagnóstico Clínico -->
                    <div>
                        <p id="textoDiagnostico" class="font-normal text-slate-600 text-sm md:text-base leading-relaxed"></p>
                    </div>
                    
                    <!-- Plano de Intervenção (Estilo Accordion/Sanfona) -->
                    <div class="mt-4">
                        <h4 class="text-xs uppercase font-bold text-slate-400 mb-2 tracking-wider">Plano de Intervenção Estratégica</h4>
                        <div id="textoAtitude" class="space-y-1">
                            <!-- Injetado via JS -->
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
    </div>

    <script>
        // Função para abrir/fechar a sanfona (accordion)
        function toggleAccordion(id) {
            const content = document.getElementById('content-' + id);
            const icon = document.getElementById('icon-' + id);
            
            if (content.classList.contains('open')) {
                content.classList.remove('open');
                icon.textContent = '+';
            } else {
                content.classList.add('open');
                icon.textContent = '−'; // sinal de menos real
            }
        }

        function calcularCarga() {
            // Coleta de Dados
            const nomeInput = document.getElementById('nome').value.trim();
            const nome = nomeInput !== "" ? nomeInput : "O(a) Profissional";
            const periodoSelecionado = document.getElementById('periodo').value;
            
            const demissoes = parseInt(document.getElementById('demissoes').value) || 0;
            const conflitos = parseInt(document.getElementById('conflitos').value) || 0;
            const interrupcoes = parseInt(document.getElementById('interrupcoes').value) || 0;
            const vagas = parseInt(document.getElementById('vagas').value) || 0;
            const horasExtras = parseInt(document.getElementById('horasExtras').value) || 0;
            const fechamento = parseInt(document.getElementById('fechamento').value) || 0;

            const cargaTotal = (demissoes * 5) + (conflitos * 5) + (interrupcoes * 2) + (vagas * 3) + (horasExtras * 2) + (fechamento * 3);

            let multiplicadorTolerancia = 1;
            let textoFrequencia = "nesta semana";

            if (periodoSelecionado === "Quinzenal") {
                multiplicadorTolerancia = 2;
                textoFrequencia = "nesta quinzena";
            } else if (periodoSelecionado === "Mensal") {
                multiplicadorTolerancia = 4;
                textoFrequencia = "neste mês";
            }

            const limiteVerde = 35 * multiplicadorTolerancia;
            const limiteAmarelo = 65 * multiplicadorTolerancia;

            const box = document.getElementById('resultadoBox');
            const titulo = document.getElementById('resultadoTitulo');
            const pontos = document.getElementById('resultadoPontos');
            const txtDiagnostico = document.getElementById('textoDiagnostico');
            const txtAtitude = document.getElementById('textoAtitude');

            // Limpeza visual das cores de borda
            box.classList.remove('border-verde-alerta', 'border-amarelo-alerta', 'border-vermelho-alerta', 'show');
            titulo.classList.remove('text-verde-alerta', 'text-amarelo-alerta', 'text-vermelho-alerta');

            setTimeout(() => {
                let conteudoSanfona = '';

                if (cargaTotal <= limiteVerde) {
                    // ZONA VERDE
                    box.classList.add('border-verde-alerta');
                    titulo.classList.add('text-verde-alerta');
                    titulo.textContent = "Equilíbrio Operacional";
                    pontos.textContent = cargaTotal + " pts";
                    txtDiagnostico.innerHTML = `Com base na avaliação ${periodoSelecionado.toLowerCase()}, <strong>${nome}</strong> apresenta níveis saudáveis de absorção cognitiva e emocional. A empatia encontra-se preservada e o risco de esgotamento é baixo.`;
                    
                    conteudoSanfona = gerarAccordion(
                        'org', 'Frente Organizacional',
                        `<li><strong>Aproveitamento Estratégico:</strong> Direcionar o foco do profissional para projetos de inovação (ex: <em>Employer Branding</em> ou <em>People Analytics</em>).</li>
                         <li><strong>Cultura e Mentoria:</strong> Delegar a condução de integrações de novos funcionários (Onboarding).</li>`
                    ) + gerarAccordion(
                        'psi', 'Frente Psicológica',
                        `<li><strong>Alinhamento de Carreira:</strong> Manter a rotina de reuniões de 1:1, priorizando discussões sobre desenvolvimento futuro.</li>`
                    ) + gerarAccordion(
                        'bem', 'Frente de Bem-Estar',
                        `<li><strong>Incentivo à Prevenção:</strong> Reforçar o uso de plataformas de qualidade de vida parceiras da empresa.</li>
                         <li><strong>Recompensa:</strong> Possível concessão de <em>Short Friday</em> como reforço positivo.</li>`
                    );

                } else if (cargaTotal > limiteVerde && cargaTotal <= limiteAmarelo) {
                    // ZONA AMARELA
                    box.classList.add('border-amarelo-alerta');
                    titulo.classList.add('text-amarelo-alerta');
                    titulo.textContent = "Alerta: Fadiga por Compaixão";
                    pontos.textContent = cargaTotal + " pts";
                    txtDiagnostico.innerHTML = `O nível de estresse de <strong>${nome}</strong> ${textoFrequencia} atingiu uma margem de atenção. Há risco do profissional iniciar atendimento em "modo automático" como defesa emocional.`;
                    
                    conteudoSanfona = gerarAccordion(
                        'org', 'Frente Organizacional',
                        `<li><strong>Bloco de Foco (Deep Work):</strong> Instituir períodos de "Porta Fechada" sem interrupções operacionais.</li>
                         <li><strong>Rodízio de Front:</strong> Pausar a alocação deste profissional em novas demissões nos próximos dias.</li>`
                    ) + gerarAccordion(
                        'psi', 'Frente Psicológica',
                        `<li><strong>Supervisão Emocional:</strong> Escuta ativa da liderança focada em acolhimento, sem pauta de metas.</li>
                         <li><strong>Descompressão Tática:</strong> Participação em rodas de conversa seguras da equipe de RH.</li>`
                    ) + gerarAccordion(
                        'bem', 'Frente de Bem-Estar',
                        `<li><strong>Pausas Ativas:</strong> Micro-pausas obrigatórias (10 min) a cada 2h de fechamento de folha.</li>
                         <li><strong>Sala Zen/Descanso:</strong> Liberação de uso do espaço de descompressão durante o expediente.</li>`
                    );

                } else {
                    // ZONA VERMELHA
                    box.classList.add('border-vermelho-alerta');
                    titulo.classList.add('text-vermelho-alerta');
                    titulo.textContent = "Risco Crítico de Burnout";
                    pontos.textContent = cargaTotal + " pts";
                    txtDiagnostico.innerHTML = `<strong>ALERTA CLÍNICO:</strong> Sobrecarga extrema detectada em <strong>${nome}</strong> ${textoFrequencia}. Esgotamento de recursos internos para mediação. Risco iminente de afastamento ou erro crítico operacional.`;
                    
                    conteudoSanfona = gerarAccordion(
                        'org', 'Frente Organizacional',
                        `<li><strong>Afastamento do Front:</strong> Movimentação emergencial para o <em>Backoffice</em>. Zero contato com público interno.</li>
                         <li><strong>Auditoria Estrutural:</strong> Notificar Diretoria. O setor necessita de contratações urgentes para diluição de carga.</li>`
                    ) + gerarAccordion(
                        'psi', 'Frente Psicológica',
                        `<li><strong>Encaminhamento EAP:</strong> Acionar suporte psicológico financiado pela empresa imediatamente.</li>
                         <li><strong>Debriefing de Trauma:</strong> Sessão guiada para processar a carga emocional absorvida recentemente.</li>`
                    ) + gerarAccordion(
                        'bem', 'Frente de Bem-Estar',
                        `<li><strong>Day Off Imediato:</strong> Folga compensatória não descontada para frear o cortisol e focar na Higiene do Sono.</li>
                         <li><strong>Desconexão Digital:</strong> Interrupção do acesso ao e-mail/WhatsApp corporativo durante o descanso.</li>`
                    );
                }
                
                txtAtitude.innerHTML = conteudoSanfona;
                box.classList.add('show');
            }, 50);
        }

        // Função auxiliar para criar a estrutura HTML de cada item da sanfona
        function gerarAccordion(id, titulo, itensLista) {
            return `
            <div class="border-b border-slate-200">
                <button type="button" onclick="toggleAccordion('${id}')" class="w-full py-3.5 flex justify-between items-center text-left focus:outline-none group">
                    <span class="font-semibold text-sm text-slate-700 group-hover:text-slate-900 transition-colors">${titulo}</span>
                    <span id="icon-${id}" class="text-xl font-light text-slate-400 group-hover:text-slate-600 transition-colors">+</span>
                </button>
                <div id="content-${id}" class="accordion-content">
                    <ul class="list-disc pl-5 pb-4 text-sm text-slate-600 space-y-2 pr-2">
                        ${itensLista}
                    </ul>
                </div>
            </div>`;
        }

        function esconderResultado() {
            const box = document.getElementById('resultadoBox');
            box.classList.remove('show');
            setTimeout(() => {
                box.classList.remove('border-verde-alerta', 'border-amarelo-alerta', 'border-vermelho-alerta');
            }, 400); 
        }
    </script>
</body>
</html>
