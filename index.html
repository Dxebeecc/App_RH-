<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guardião do RH</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Fonte Inter do Google -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        wh: {
                            bg: '#fcf8f2',       /* Fundo creme/bege claro */
                            card: '#f4eadd',     /* Bege mais escuro pros cards */
                            primary: '#d63b60',  /* Rosa/Vermelho (Botões) */
                            primaryHover: '#b93151',
                            text: '#1e293b',     /* Texto azul marinho super escuro */
                            accent: '#0f172a'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #fcf8f2; }

        /* Animação do card de resultado */
        .resultado-card {
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            transform: translateY(20px);
            opacity: 0;
            display: none;
        }
        .resultado-card.show {
            transform: translateY(0);
            opacity: 1;
            display: block;
        }
        
        /* Transição para a sanfona (accordion) */
        .accordion-content {
            transition: max-height 0.4s ease-in-out, opacity 0.3s ease-in-out;
            max-height: 0;
            opacity: 0;
            overflow: hidden;
        }
        .accordion-content.open {
            max-height: 800px; 
            opacity: 1;
        }

        /* Estilo do marcador da barra de progresso - animação de "salto" */
        .marcador-progresso {
            transition: left 1.2s cubic-bezier(0.34, 1.56, 0.64, 1); 
        }

        /* Oculta setinhas nativas dos inputs number */
        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
    </style>
</head>
<body class="text-wh-text antialiased min-h-screen flex items-start justify-center p-4 sm:p-8">

    <!-- Container Principal (Sem fundo branco agressivo, integrado ao body) -->
    <div class="max-w-3xl w-full">
        
        <!-- CABEÇALHO (Estilo Plataforma Wellness) -->
        <div class="pt-4 pb-8 flex flex-col sm:flex-row items-center sm:justify-between text-center sm:text-left gap-4">
            <div class="flex items-center space-x-4">
                <!-- Logo: Escudo Abstrato -->
                <div class="w-14 h-14 bg-wh-primary/10 rounded-2xl flex items-center justify-center text-wh-primary">
                    <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path>
                    </svg>
                </div>
                <div>
                    <h1 class="text-3xl font-extrabold tracking-tight text-wh-accent leading-tight">Guardião do RH</h1>
                    <p class="text-wh-primary text-xs font-bold uppercase tracking-widest mt-1">Plataforma de Saúde Organizacional</p>
                </div>
            </div>
            
            <div class="hidden sm:flex items-center px-4 py-2 bg-wh-card rounded-full border border-wh-primary/10">
                <span class="w-2.5 h-2.5 rounded-full bg-emerald-500 mr-2 animate-pulse"></span>
                <span class="text-xs font-bold text-wh-accent opacity-80">Sistema Ativo</span>
            </div>
        </div>

        <!-- CORPO DO APP (Formulário) -->
        <div class="mt-2">
            <form id="cockpitForm" class="space-y-8">
                
                <!-- Seção 1: Configuração da Análise -->
                <div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                        <div class="bg-white p-3 rounded-2xl border border-black/5 shadow-sm">
                            <label for="nome" class="block text-[11px] font-bold text-wh-text/60 uppercase tracking-widest mb-1.5 px-1">Colaborador Avaliado</label>
                            <input type="text" id="nome" placeholder="Digite o nome do analista" class="w-full px-3 py-2 rounded-xl focus:ring-2 focus:ring-wh-primary/30 outline-none transition-all text-[15px] font-semibold text-wh-accent bg-transparent" required>
                        </div>
                        <div class="bg-white p-3 rounded-2xl border border-black/5 shadow-sm">
                            <label for="periodo" class="block text-[11px] font-bold text-wh-text/60 uppercase tracking-widest mb-1.5 px-1">Período de Análise</label>
                            <div class="relative">
                                <select id="periodo" class="w-full px-3 py-2 rounded-xl focus:ring-2 focus:ring-wh-primary/30 outline-none transition-all cursor-pointer text-[15px] font-semibold text-wh-accent appearance-none bg-transparent">
                                    <option value="Semanal" selected>Semanal (Recomendado)</option>
                                    <option value="Quinzenal">Quinzenal</option>
                                    <option value="Mensal">Mensal</option>
                                </select>
                                <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-wh-text/40">
                                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Seção 2: Inputs de Carga -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    
                    <!-- Card: Carga Emocional -->
                    <div class="bg-wh-card p-6 rounded-[24px]">
                        <h3 class="text-sm font-extrabold text-wh-accent uppercase mb-6 flex items-center tracking-wider">
                            <span class="w-8 h-8 rounded-full bg-wh-primary/10 text-wh-primary flex items-center justify-center mr-3">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"></path></svg>
                            </span> 
                            Carga Emocional
                        </h3>
                        <div class="space-y-4">
                            <div class="bg-white/60 p-1.5 pl-4 rounded-xl flex justify-between items-center border border-white/40 focus-within:ring-2 focus-within:ring-wh-primary/30 transition-all">
                                <div class="flex-1">
                                    <label for="conflitos" class="block text-sm font-semibold text-wh-accent">Mediação de Conflitos</label>
                                    <span class="text-[10px] text-wh-primary font-bold uppercase tracking-widest">Peso 10</span>
                                </div>
                                <input type="number" id="conflitos" min="0" value="0" class="w-16 h-12 text-center text-lg font-bold rounded-lg bg-white outline-none">
                            </div>
                            <div class="bg-white/60 p-1.5 pl-4 rounded-xl flex justify-between items-center border border-white/40 focus-within:ring-2 focus-within:ring-wh-primary/30 transition-all">
                                <div class="flex-1">
                                    <label for="demissoes" class="block text-sm font-semibold text-wh-accent">Demissões Conduzidas</label>
                                    <span class="text-[10px] text-wh-primary font-bold uppercase tracking-widest">Peso 8</span>
                                </div>
                                <input type="number" id="demissoes" min="0" value="0" class="w-16 h-12 text-center text-lg font-bold rounded-lg bg-white outline-none">
                            </div>
                            <div class="bg-white/60 p-1.5 pl-4 rounded-xl flex justify-between items-center border border-white/40 focus-within:ring-2 focus-within:ring-wh-primary/30 transition-all">
                                <div class="flex-1">
                                    <label for="interrupcoes" class="block text-sm font-semibold text-wh-accent">Atendimentos Surpresa</label>
                                    <span class="text-[10px] text-wh-text/50 font-bold uppercase tracking-widest">Peso 1</span>
                                </div>
                                <input type="number" id="interrupcoes" min="0" value="0" class="w-16 h-12 text-center text-lg font-bold rounded-lg bg-white outline-none">
                            </div>
                        </div>
                    </div>

                    <!-- Card: Carga Cognitiva -->
                    <div class="bg-wh-card p-6 rounded-[24px]">
                        <h3 class="text-sm font-extrabold text-wh-accent uppercase mb-6 flex items-center tracking-wider">
                            <span class="w-8 h-8 rounded-full bg-[#1e3a8a]/10 text-[#1e3a8a] flex items-center justify-center mr-3">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"></path></svg>
                            </span>
                            Carga Cognitiva
                        </h3>
                        <div class="space-y-4">
                            <div class="bg-white/60 p-1.5 pl-4 rounded-xl flex justify-between items-center border border-white/40 focus-within:ring-2 focus-within:ring-[#1e3a8a]/30 transition-all">
                                <div class="flex-1">
                                    <label for="vagas" class="block text-sm font-semibold text-wh-accent">Vagas/Seleções Abertas</label>
                                    <span class="text-[10px] text-[#1e3a8a] font-bold uppercase tracking-widest">Peso 4</span>
                                </div>
                                <input type="number" id="vagas" min="0" value="0" class="w-16 h-12 text-center text-lg font-bold rounded-lg bg-white outline-none">
                            </div>
                            <div class="bg-white/60 p-1.5 pl-4 rounded-xl flex justify-between items-center border border-white/40 focus-within:ring-2 focus-within:ring-[#1e3a8a]/30 transition-all">
                                <div class="flex-1">
                                    <label for="horasExtras" class="block text-sm font-semibold text-wh-accent">Horas Extras Realizadas</label>
                                    <span class="text-[10px] text-[#1e3a8a] font-bold uppercase tracking-widest">Peso 3</span>
                                </div>
                                <input type="number" id="horasExtras" min="0" value="0" class="w-16 h-12 text-center text-lg font-bold rounded-lg bg-white outline-none">
                            </div>
                            <div class="bg-white/60 p-1.5 pl-4 rounded-xl flex justify-between items-center border border-white/40 focus-within:ring-2 focus-within:ring-[#1e3a8a]/30 transition-all">
                                <div class="flex-1">
                                    <label for="fechamento" class="block text-sm font-semibold text-wh-accent">Pessoas na Folha</label>
                                    <span class="text-[10px] text-wh-text/50 font-bold uppercase tracking-widest">Peso 0.2</span>
                                </div>
                                <input type="number" id="fechamento" min="0" value="0" class="w-16 h-12 text-center text-lg font-bold rounded-lg bg-white outline-none">
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Botões de Ação (Arredondados como no Wellhub) -->
                <div class="flex flex-col sm:flex-row gap-4 pt-6">
                    <button type="button" onclick="calcularCarga()" class="w-full sm:w-2/3 bg-wh-primary hover:bg-wh-primaryHover text-white font-bold text-[15px] py-4 px-6 rounded-full transition duration-300 ease-in-out shadow-[0_8px_20px_rgba(214,59,96,0.3)] hover:shadow-[0_10px_25px_rgba(214,59,96,0.4)] hover:-translate-y-0.5 flex justify-center items-center">
                        Gerar Diagnóstico Avançado
                    </button>
                    <button type="reset" onclick="esconderResultado()" class="w-full sm:w-1/3 bg-transparent border-2 border-wh-primary text-wh-primary hover:bg-wh-primary/5 font-bold text-[15px] py-4 px-6 rounded-full transition duration-200 ease-in-out">
                        Nova Análise
                    </button>
                </div>
            </form>

            <!-- ================= ÁREA DE RESULTADO (Clean & Premium) ================= -->
            <div id="resultadoBox" class="resultado-card mt-12 bg-white rounded-[32px] shadow-[0_15px_60px_rgba(0,0,0,0.06)] overflow-hidden">
                
                <!-- Cabeçalho Dinâmico do Laudo -->
                <div id="headerLaudo" class="p-8 lg:p-10 flex flex-col md:flex-row items-center md:items-start justify-between gap-8 transition-colors duration-500 bg-white">
                    
                    <!-- Lado Esquerdo: Textos e Nota -->
                    <div class="w-full md:w-1/2 text-center md:text-left">
                        <span class="text-[11px] font-extrabold uppercase tracking-widest opacity-50 mb-2 block text-wh-text">Status da Avaliação</span>
                        <h2 id="resultadoTitulo" class="text-3xl lg:text-4xl font-black uppercase tracking-tight mb-2 text-wh-accent"></h2>
                        <div class="flex items-baseline justify-center md:justify-start gap-1">
                            <span id="resultadoPontos" class="text-6xl font-black tracking-tighter text-wh-accent"></span>
                            <span class="text-lg font-bold opacity-60 text-wh-accent">pts</span>
                        </div>
                    </div>

                    <!-- Lado Direito: Régua Progressiva e Marcador Consertado -->
                    <div class="w-full md:w-1/2 max-w-sm mt-4 md:mt-0">
                        <div class="flex justify-between text-[11px] uppercase font-extrabold opacity-60 mb-3 px-1 tracking-widest text-wh-text">
                            <span>Equilíbrio</span>
                            <span>Alerta</span>
                            <span>Crítico</span>
                        </div>
                        
                        <!-- Container Relativo para o Marcador -->
                        <div class="relative w-full">
                            <!-- Pista de Cores -->
                            <div class="h-4 rounded-full overflow-hidden flex shadow-inner bg-slate-100">
                                <div class="h-full bg-[#10b981]" style="width: 33.33%"></div>
                                <div class="h-full bg-[#f59e0b]" style="width: 29.17%"></div>
                                <div class="h-full bg-[#ef4444]" style="width: 37.5%"></div>
                            </div>
                            
                            <!-- O Marcador Centralizado -->
                            <div id="marcadorBarra" class="marcador-progresso absolute top-1/2 -translate-y-1/2 w-6 h-6 rounded-full bg-white border-[4px] border-wh-accent shadow-[0_4px_10px_rgba(0,0,0,0.2)]" style="left: 0%; margin-left: -12px;"></div>
                        </div>
                    </div>
                </div>

                <!-- Corpo do Laudo -->
                <div class="p-8 lg:p-10 pt-0 lg:pt-0 bg-white">
                    
                    <!-- Diagnóstico Clínico -->
                    <div id="boxDiagnosticoBg" class="p-6 rounded-2xl border transition-colors duration-500 mt-2 mb-8 bg-wh-bg border-black/5">
                        <h4 class="text-[11px] uppercase font-extrabold mb-3 tracking-widest flex items-center opacity-70 text-wh-accent">
                            <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                            Parecer Técnico (<span id="spanPeriodo"></span>)
                        </h4>
                        <p id="textoDiagnostico" class="font-semibold text-[15px] leading-relaxed text-wh-accent"></p>
                    </div>
                    
                    <!-- Plano de Intervenção (Accordion) -->
                    <div>
                        <h4 class="text-sm uppercase font-black text-wh-accent mb-5 tracking-widest">
                            Plano de Intervenção Estratégica
                        </h4>
                        <div id="textoAtitude" class="space-y-3">
                            <!-- Injetado via JS -->
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
    </div>

    <script>
        // Função para abrir/fechar a sanfona
        function toggleAccordion(id) {
            const content = document.getElementById('content-' + id);
            const icon = document.getElementById('icon-' + id);
            
            if (content.classList.contains('open')) {
                content.classList.remove('open');
                icon.textContent = '+';
            } else {
                content.classList.add('open');
                icon.innerHTML = '&minus;'; 
            }
        }

        function calcularCarga() {
            // Coleta de Dados
            const nomeInput = document.getElementById('nome').value.trim();
            const nome = nomeInput !== "" ? nomeInput : "O(a) Profissional";
            const periodoSelecionado = document.getElementById('periodo').value;
            
            const conflitos = parseInt(document.getElementById('conflitos').value) || 0;
            const demissoes = parseInt(document.getElementById('demissoes').value) || 0;
            const interrupcoes = parseInt(document.getElementById('interrupcoes').value) || 0;
            const vagas = parseInt(document.getElementById('vagas').value) || 0;
            const horasExtras = parseInt(document.getElementById('horasExtras').value) || 0;
            const fechamento = parseInt(document.getElementById('fechamento').value) || 0;

            // Lógica de Pesos
            const pesoConflito = 10;
            const pesoDemissao = 8;
            const pesoInterrupcao = 1;
            const pesoVaga = 4;
            const pesoHoraExtra = 3;
            const pesoFechamento = 0.2; 

            // Cálculo Matemático
            const cargaTotal = Math.round(
                (conflitos * pesoConflito) + 
                (demissoes * pesoDemissao) + 
                (interrupcoes * pesoInterrupcao) + 
                (vagas * pesoVaga) + 
                (horasExtras * pesoHoraExtra) + 
                (fechamento * pesoFechamento)
            );

            // Inteligência de Período
            let multiplicadorTolerancia = 1;
            let textoFrequencia = "nesta semana";

            if (periodoSelecionado === "Quinzenal") {
                multiplicadorTolerancia = 2;
                textoFrequencia = "nesta quinzena";
            } else if (periodoSelecionado === "Mensal") {
                multiplicadorTolerancia = 4;
                textoFrequencia = "neste mês";
            }

            // Limites
            const limiteVerde = 40 * multiplicadorTolerancia;
            const limiteAmarelo = 75 * multiplicadorTolerancia;
            
            // Lógica da Barra Visual (Base 120 por semana)
            const maxVisualScore = 120 * multiplicadorTolerancia;
            let percentualBarra = (cargaTotal / maxVisualScore) * 100;
            if (percentualBarra > 100) percentualBarra = 100;

            const box = document.getElementById('resultadoBox');
            const headerLaudo = document.getElementById('headerLaudo');
            const titulo = document.getElementById('resultadoTitulo');
            const pontos = document.getElementById('resultadoPontos');
            const boxDiagnosticoBg = document.getElementById('boxDiagnosticoBg');
            const txtDiagnostico = document.getElementById('textoDiagnostico');
            const txtAtitude = document.getElementById('textoAtitude');
            const marcador = document.getElementById('marcadorBarra');
            const spanPeriodo = document.getElementById('spanPeriodo');

            // Limpeza visual
            const resetClasses = ['bg-[#ecfdf5]', 'bg-[#fffbeb]', 'bg-[#fef2f2]', 'text-[#047857]', 'text-[#b45309]', 'text-[#be123c]', 'border-[#a7f3d0]', 'border-[#fde68a]', 'border-[#fecdd3]'];
            headerLaudo.classList.remove(...resetClasses);
            boxDiagnosticoBg.classList.remove(...resetClasses);
            titulo.classList.remove('text-[#047857]', 'text-[#b45309]', 'text-[#be123c]', 'text-wh-accent');
            pontos.classList.remove('text-[#047857]', 'text-[#b45309]', 'text-[#be123c]', 'text-wh-accent');
            box.classList.remove('show');
            
            marcador.style.left = '0%';
            spanPeriodo.textContent = periodoSelecionado;

            setTimeout(() => {
                let conteudoSanfona = '';
                marcador.style.left = percentualBarra + '%';

                if (cargaTotal <= limiteVerde) {
                    // ZONA VERDE
                    headerLaudo.classList.add('bg-[#ecfdf5]', 'text-[#047857]');
                    titulo.classList.add('text-[#047857]');
                    pontos.classList.add('text-[#047857]');
                    boxDiagnosticoBg.classList.add('bg-[#ecfdf5]', 'border-[#a7f3d0]', 'text-[#047857]');
                    
                    titulo.textContent = "Equilíbrio Operacional";
                    pontos.textContent = cargaTotal;
                    txtDiagnostico.innerHTML = `<strong>${nome}</strong> apresenta níveis saudáveis de absorção cognitiva e emocional. A empatia encontra-se preservada, permitindo tomadas de decisão estratégicas e acolhimento genuíno aos colaboradores. O risco psicossocial atual é baixo.`;
                    
                    conteudoSanfona = gerarAccordion(
                        'org', '🛡️ 1. Frente Organizacional',
                        `<li class="leading-relaxed mb-3"><strong>Aproveitamento Estratégico:</strong> Direcionar o foco do profissional para projetos de inovação, como a estruturação do <em>Employer Branding</em> (Marca Empregadora) ou a análise de dados em <em>People Analytics</em>.</li>
                         <li class="leading-relaxed"><strong>Cultura e Mentoria:</strong> Delegar a condução de integrações de novos funcionários (Onboarding) para aproveitar sua estabilidade emocional e engajamento, transmitindo uma energia positiva aos recém-chegados.</li>`
                    ) + gerarAccordion(
                        'psi', '🧠 2. Frente Psicológica',
                        `<li class="leading-relaxed"><strong>1:1 de Carreira:</strong> Manter a rotina de reuniões de alinhamento com a liderança, priorizando discussões sobre desenvolvimento e plano de carreira, demonstrando claramente o investimento da empresa no futuro do colaborador.</li>`
                    ) + gerarAccordion(
                        'bem', '💆 3. Frente de Bem-Estar e Benefícios',
                        `<li class="leading-relaxed mb-3"><strong>Incentivo à Qualidade de Vida:</strong> Reforçar a comunicação para que o profissional utilize as plataformas parceiras da empresa (como Gympass/Wellhub, ou convênios com nutricionistas e psicólogos preventivos).</li>
                         <li class="leading-relaxed"><strong>Recompensa Operacional:</strong> Avaliar a concessão de <em>Short Friday</em> (saída antecipada na sexta-feira) como um reforço positivo (Behaviorismo) pelo desempenho sustentável entregue.</li>`
                    );

                } else if (cargaTotal > limiteVerde && cargaTotal <= limiteAmarelo) {
                    // ZONA AMARELA
                    headerLaudo.classList.add('bg-[#fffbeb]', 'text-[#b45309]');
                    titulo.classList.add('text-[#b45309]');
                    pontos.classList.add('text-[#b45309]');
                    boxDiagnosticoBg.classList.add('bg-[#fffbeb]', 'border-[#fde68a]', 'text-[#b45309]');
                    
                    titulo.textContent = "Alerta: Fadiga por Compaixão";
                    pontos.textContent = cargaTotal;
                    txtDiagnostico.innerHTML = `O nível de estresse de <strong>${nome}</strong> atingiu uma margem de atenção. Há alto risco do profissional iniciar o atendimento em "modo automático", reduzindo a humanização e a escuta ativa como defesa emocional contra a sobrecarga.`;
                    
                    conteudoSanfona = gerarAccordion(
                        'org', '🛡️ 1. Frente Organizacional',
                        `<li class="leading-relaxed mb-3"><strong>Deep Work (Bloco de Foco):</strong> Instituir pelo menos 2 períodos na semana de "Porta Fechada" (sem atendimento ao público ou interrupções operacionais) permitindo o escoamento das pendências.</li>
                         <li class="leading-relaxed"><strong>Rodízio de Front:</strong> O gestor deve bloquear a agenda do profissional para a condução de novas demissões ou mediações de conflito nos próximos dias, diluindo a carga com a equipe.</li>`
                    ) + gerarAccordion(
                        'psi', '🧠 2. Frente Psicológica',
                        `<li class="leading-relaxed mb-3"><strong>Supervisão Emocional:</strong> A liderança deve realizar uma escuta ativa de 30 minutos focada exclusivamente em acolhimento emocional. É expressamente proibido falar de metas neste momento.</li>
                         <li class="leading-relaxed"><strong>Grupos de Balint (Adaptação RH):</strong> Incentivar a participação em rodas de conversa seguras da própria equipe para processamento coletivo da carga de casos difíceis, aliviando a "solidão da decisão".</li>`
                    ) + gerarAccordion(
                        'bem', '💆 3. Frente de Bem-Estar e Benefícios',
                        `<li class="leading-relaxed mb-3"><strong>Descompressão In Loco:</strong> Liberação documentada para uso da Sala Zen/Descanso da empresa durante o expediente e agendamento prioritário de sessão de <em>Quick Massage</em> corporativa.</li>
                         <li class="leading-relaxed"><strong>Pausas Ativas Obrigatórias:</strong> A cada 2 horas de trabalho analítico pesado (como folha), o profissional deve realizar uma micro-pausa de 10 minutos desconectada de telas para alongamento.</li>`
                    );

                } else {
                    // ZONA VERMELHA
                    headerLaudo.classList.add('bg-[#fef2f2]', 'text-[#be123c]');
                    titulo.classList.add('text-[#be123c]');
                    pontos.classList.add('text-[#be123c]');
                    boxDiagnosticoBg.classList.add('bg-[#fef2f2]', 'border-[#fecdd3]', 'text-[#be123c]');
                    
                    titulo.textContent = "Risco Crítico de Burnout";
                    pontos.textContent = cargaTotal;
                    txtDiagnostico.innerHTML = `<strong>ALERTA CLÍNICO:</strong> Sobrecarga extrema detectada em <strong>${nome}</strong>. Há esgotamento de recursos para mediação humana. O risco de afastamento médico, erros graves na folha ou geração de passivo trabalhista por condução inadequada é iminente.`;
                    
                    conteudoSanfona = gerarAccordion(
                        'org', '🛡️ 1. Frente Organizacional',
                        `<li class="leading-relaxed mb-3"><strong>Afastamento Total do Front:</strong> Movimentação emergencial imediata. O profissional é retirado no mesmo dia de qualquer contato com o público, mediações ou demissões. Realocação para o <em>Backoffice</em>.</li>
                         <li class="leading-relaxed"><strong>Auditoria Estrutural:</strong> Notificar a Diretoria Executiva sobre o estouro do <em>RH Headcount Ratio</em>. O setor demonstra necessidade de contratação com urgência para diluição da carga operacional.</li>`
                    ) + gerarAccordion(
                        'psi', '🧠 2. Frente Psicológica',
                        `<li class="leading-relaxed mb-3"><strong>EAP Obrigatório (Apoio Psicológico):</strong> A liderança aciona o Programa de Apoio ao Empregado, garantindo o encaminhamento formal do profissional para sessões de psicoterapia custeadas pela empresa.</li>
                         <li class="leading-relaxed"><strong>Debriefing de Trauma:</strong> Sessão de descompressão especializada guiada para ajudar o analista a processar e não internalizar "o trauma do outro", essencial após o atendimento de casos de assédio moral/sexual.</li>`
                    ) + gerarAccordion(
                        'bem', '💆 3. Frente de Bem-Estar e Benefícios',
                        `<li class="leading-relaxed mb-3"><strong>Quebra de Ciclo (Day Off):</strong> Ação imediata para cortar a produção de cortisol. O profissional recebe uma folga compulsória não descontada para focar na recuperação de sua Higiene do Sono.</li>
                         <li class="leading-relaxed"><strong>Desconexão Digital Protegida:</strong> Durante o afastamento, a TI atua bloqueando ativamente os gestores e encarregados de entrarem em contato com este funcionário, garantindo repouso real.</li>`
                    );
                }
                
                txtAtitude.innerHTML = conteudoSanfona;
                box.classList.add('show');
                
                // Rola a página suavemente para o resultado
                setTimeout(() => {
                    box.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }, 100);

            }, 50);
        }

        function gerarAccordion(id, titulo, itensLista) {
            return `
            <div class="border border-black/5 rounded-2xl overflow-hidden bg-white hover:border-wh-primary/20 transition-all duration-200 shadow-sm">
                <button type="button" onclick="toggleAccordion('${id}')" class="w-full px-6 py-5 flex justify-between items-center text-left focus:outline-none group bg-transparent">
                    <span class="font-extrabold text-[15px] text-wh-accent group-hover:text-wh-primary transition-colors">${titulo}</span>
                    <span id="icon-${id}" class="text-2xl font-medium text-wh-text/30 group-hover:text-wh-primary transition-colors">+</span>
                </button>
                <div id="content-${id}" class="accordion-content">
                    <div class="px-6 pb-6 pt-1">
                        <ul class="list-disc pl-5 text-[14px] text-wh-accent/80 font-medium">
                            ${itensLista}
                        </ul>
                    </div>
                </div>
            </div>`;
        }

        function esconderResultado() {
            const box = document.getElementById('resultadoBox');
            box.classList.remove('show');
            setTimeout(() => {
                const resetClasses = ['bg-[#ecfdf5]', 'bg-[#fffbeb]', 'bg-[#fef2f2]', 'text-[#047857]', 'text-[#b45309]', 'text-[#be123c]', 'border-[#a7f3d0]', 'border-[#fde68a]', 'border-[#fecdd3]', 'text-wh-accent'];
                document.getElementById('headerLaudo').classList.remove(...resetClasses);
                document.getElementById('boxDiagnosticoBg').classList.remove(...resetClasses);
                document.getElementById('marcadorBarra').style.left = '0%';
            }, 500); 
        }
    </script>
</body>
</html>
