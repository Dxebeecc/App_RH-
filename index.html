<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cockpit: Guardião do RH</title>
    <!-- Tailwind CSS (via CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* CSS customizado para os cards de resultado */
        .resultado-card {
            transition: all 0.3s ease-in-out;
            transform: scale(0.95);
            opacity: 0;
            display: none;
        }
        .resultado-card.show {
            transform: scale(1);
            opacity: 1;
            display: block;
        }
        /* Definição das cores baseadas no nível de risco */
        .bg-verde-alerta { background-color: #d1fae5; border-color: #34d399; }
        .text-verde-alerta { color: #065f46; }
        
        .bg-amarelo-alerta { background-color: #fef3c7; border-color: #fbbf24; }
        .text-amarelo-alerta { color: #92400e; }
        
        .bg-vermelho-alerta { background-color: #fee2e2; border-color: #f87171; }
        .text-vermelho-alerta { color: #991b1b; }
    </style>
</head>
<body class="bg-slate-100 font-sans text-slate-800 antialiased min-h-screen flex items-center justify-center p-4">

    <div class="max-w-2xl w-full bg-white rounded-2xl shadow-xl overflow-hidden">
        
        <!-- Cabeçalho -->
        <div class="bg-slate-800 p-6 text-white text-center">
            <h1 class="text-3xl font-bold tracking-tight">Cockpit: Guardião do RH</h1>
            <p class="text-slate-300 mt-2 text-sm font-medium uppercase tracking-wider">Sistema de Monitoramento de Carga Cognitiva e Emocional</p>
        </div>

        <div class="p-8">
            <form id="cockpitForm" class="space-y-6">
                <!-- Seção: Identificação -->
                <div>
                    <label for="nome" class="block text-sm font-semibold text-slate-700 mb-1">Nome do Profissional de RH:</label>
                    <input type="text" id="nome" placeholder="Ex: João Silva" class="w-full px-4 py-3 rounded-lg border border-slate-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all" required>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <!-- Seção: Front de Choque (Alta Carga Emocional) -->
                    <div class="bg-slate-50 p-5 rounded-xl border border-slate-200">
                        <h3 class="text-sm font-bold text-slate-800 uppercase mb-4 flex items-center">
                            <svg class="w-5 h-5 mr-2 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
                            O Front de Choque
                        </h3>
                        
                        <div class="space-y-4">
                            <div>
                                <label for="demissoes" class="block text-sm font-medium text-slate-700 flex justify-between">
                                    <span>Demissões Conduzidas</span>
                                    <span class="text-xs text-slate-500 font-normal">(Peso 5)</span>
                                </label>
                                <input type="number" id="demissoes" min="0" value="0" class="mt-1 w-full px-3 py-2 rounded-md border border-slate-300 focus:ring-2 focus:ring-blue-500 outline-none">
                            </div>
                            <div>
                                <label for="conflitos" class="block text-sm font-medium text-slate-700 flex justify-between">
                                    <span>Mediação de Conflitos/Assédio</span>
                                    <span class="text-xs text-slate-500 font-normal">(Peso 5)</span>
                                </label>
                                <input type="number" id="conflitos" min="0" value="0" class="mt-1 w-full px-3 py-2 rounded-md border border-slate-300 focus:ring-2 focus:ring-blue-500 outline-none">
                            </div>
                        </div>
                    </div>

                    <!-- Seção: Fadiga Operacional e Proteção -->
                    <div class="bg-slate-50 p-5 rounded-xl border border-slate-200">
                         <h3 class="text-sm font-bold text-slate-800 uppercase mb-4 flex items-center">
                            <svg class="w-5 h-5 mr-2 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path></svg>
                            Fadiga e Proteção
                        </h3>

                        <div class="space-y-4">
                            <div>
                                <label for="horasExtras" class="block text-sm font-medium text-slate-700 flex justify-between">
                                    <span>Horas Extras (Carga Física)</span>
                                    <span class="text-xs text-slate-500 font-normal">(Peso 2)</span>
                                </label>
                                <input type="number" id="horasExtras" min="0" value="0" class="mt-1 w-full px-3 py-2 rounded-md border border-slate-300 focus:ring-2 focus:ring-blue-500 outline-none">
                            </div>
                             <div>
                                <label for="fechamento" class="block text-sm font-medium text-slate-700 flex justify-between">
                                    <span>Fechamento de Folha/Ponto</span>
                                    <span class="text-xs text-slate-500 font-normal">(Peso 3)</span>
                                </label>
                                <input type="number" id="fechamento" min="0" value="0" class="mt-1 w-full px-3 py-2 rounded-md border border-slate-300 focus:ring-2 focus:ring-blue-500 outline-none">
                            </div>
                        </div>
                    </div>
                </div>

                <button type="button" onclick="calcularCarga()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 px-6 rounded-xl shadow-lg transition duration-200 ease-in-out transform hover:-translate-y-1">
                    Analisar Carga e Gerar Protocolo
                </button>
            </form>

            <!-- Área de Resultado -->
            <div id="resultadoBox" class="resultado-card mt-8 border-l-4 rounded-r-lg p-6">
                <div class="flex items-center justify-between mb-4 border-b pb-4 border-current border-opacity-20">
                    <h2 id="resultadoTitulo" class="text-xl font-bold uppercase tracking-wide"></h2>
                    <span id="resultadoPontos" class="text-3xl font-black"></span>
                </div>
                
                <div class="space-y-4">
                    <div>
                        <h4 class="text-sm uppercase font-bold opacity-75 mb-1">Diagnóstico Psicológico</h4>
                        <p id="textoDiagnostico" class="font-medium text-lg leading-relaxed"></p>
                    </div>
                    
                    <div class="bg-white bg-opacity-50 p-4 rounded-lg mt-4">
                        <h4 class="text-sm uppercase font-bold opacity-75 mb-2">Atitude do RH (Protocolo)</h4>
                        <ul id="textoAtitude" class="list-disc pl-5 space-y-2 font-medium"></ul>
                    </div>
                </div>
            </div>

        </div>
        
        <!-- Rodapé (opcional, para dar um toque mais acadêmico/profissional) -->
        <div class="bg-slate-50 text-center p-4 text-xs text-slate-500 border-t">
            Projeto Integrado - Gestão Humanizada: "Quem cuida de quem cuida?"
        </div>
    </div>

    <script>
        function calcularCarga() {
            // 1. Coletar dados
            const nomeInput = document.getElementById('nome').value.trim();
            const nome = nomeInput !== "" ? nomeInput : "O(a) Profissional";
            
            const demissoes = parseInt(document.getElementById('demissoes').value) || 0;
            const conflitos = parseInt(document.getElementById('conflitos').value) || 0;
            const horasExtras = parseInt(document.getElementById('horasExtras').value) || 0;
            const fechamento = parseInt(document.getElementById('fechamento').value) || 0;

            // 2. Definir os Pesos (conforme combinado)
            const pesoDemissao = 5;
            const pesoConflito = 5;
            const pesoHoraExtra = 2;
            const pesoFechamento = 3;

            // 3. Calcular Carga Total
            const cargaTotal = (demissoes * pesoDemissao) + 
                               (conflitos * pesoConflito) + 
                               (horasExtras * pesoHoraExtra) + 
                               (fechamento * pesoFechamento);

            // 4. Elementos de UI
            const box = document.getElementById('resultadoBox');
            const titulo = document.getElementById('resultadoTitulo');
            const pontos = document.getElementById('resultadoPontos');
            const txtDiagnostico = document.getElementById('textoDiagnostico');
            const txtAtitude = document.getElementById('textoAtitude');

            // Limpar classes antigas
            box.classList.remove('bg-verde-alerta', 'text-verde-alerta', 'bg-amarelo-alerta', 'text-amarelo-alerta', 'bg-vermelho-alerta', 'text-vermelho-alerta', 'show');

            // Timeout rápido para a animação de "piscar" ao calcular novamente
            setTimeout(() => {
                // 5. Lógica de Decisão e Matriz de Atitudes
                if (cargaTotal <= 15) {
                    // Zona Verde
                    box.classList.add('bg-verde-alerta', 'text-verde-alerta');
                    titulo.textContent = "Equilíbrio Operacional";
                    pontos.textContent = cargaTotal + " pts";
                    
                    txtDiagnostico.innerHTML = `<strong>${nome}</strong> está com a "bateria" cheia, capaz de exercer empatia real e tomar decisões complexas sem risco psicossocial iminente.`;
                    
                    txtAtitude.innerHTML = `
                        <li><strong>Manutenção das rotinas:</strong> O profissional está liberado para assumir demandas críticas.</li>
                        <li><strong>Aproveitamento Estratégico:</strong> Bom momento para conduzir treinamentos e liderar processos de seleção.</li>
                    `;

                } else if (cargaTotal >= 16 && cargaTotal <= 29) {
                    // Zona Amarela
                    box.classList.add('bg-amarelo-alerta', 'text-amarelo-alerta');
                    titulo.textContent = "Alerta: Fadiga por Compaixão";
                    pontos.textContent = cargaTotal + " pts";
                    
                    txtDiagnostico.innerHTML = `O reservatório de empatia de <strong>${nome}</strong> está baixando. Há indícios de atuação no "modo automático" para se proteger da carga emocional.`;
                    
                    txtAtitude.innerHTML = `
                        <li><strong>Rodízio de Front:</strong> Bloquear a agenda para novas demissões nesta semana.</li>
                        <li><strong>Realocação Temporária:</strong> Direcionar para o <em>backoffice</em> (análise de currículos, auditoria de ponto).</li>
                        <li><strong>Escuta Ativa:</strong> Agendar um momento rápido de alinhamento e escuta com a liderança.</li>
                    `;

                } else {
                    // Zona Vermelha
                    box.classList.add('bg-vermelho-alerta', 'text-vermelho-alerta');
                    titulo.textContent = "Risco Crítico de Burnout";
                    pontos.textContent = cargaTotal + " pts";
                    
                    txtDiagnostico.innerHTML = `<strong>ALERTA DE SEGURANÇA.</strong> Sobrecarga aguda detectada em <strong>${nome}</strong>. O profissional está perdendo a capacidade de escuta e o risco de adoecimento (afastamento) é iminente.`;
                    
                    txtAtitude.innerHTML = `
                        <li><strong>Parada Obrigatória:</strong> Retirar <strong>imediatamente</strong> de qualquer mediação de conflito ou demissão.</li>
                        <li><strong>Descompressão:</strong> Conceder <em>Day Off</em> (folga) imediato ou acionar banco de horas.</li>
                        <li><strong>Suporte:</strong> Acionar o Programa de Apoio Psicológico da empresa e revisar o <em>Headcount</em> do setor.</li>
                    `;
                }

                // Exibir a caixa com animação
                box.classList.add('show');
            }, 50); // pequeno delay
        }
    </script>
</body>
</html>
